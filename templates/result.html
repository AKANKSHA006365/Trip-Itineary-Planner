6<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Itinerary</title>

<link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>

<body>

<div class="bg"></div>
<div class="overlay-bg"></div>

<h1 class="title">Your Travel Itinerary</h1>

<div class="grid">
{% for day, places in plan.items() %}

<div class="card">

  <div class="places">
    <h3>Day {{ day }}</h3>

    {% for place, hours in places %}
      <p>📍 {{ place }} - {{ hours }} hrs</p>
    {% endfor %}

  </div>

</div>

{% endfor %}
</div>

</body>
</html>
